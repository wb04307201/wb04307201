name: Markdown Link Check

on:
  push:
    branches: [master]
    paths:
      - "note/**/*.md"
      - "README.md"
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 06:00
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "no"
          config-file: ".mlc_config.json"
          folder-path: "note"
          file-path: "README.md"
